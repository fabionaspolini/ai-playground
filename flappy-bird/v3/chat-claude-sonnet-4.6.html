<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  #canvas-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* ── OVERLAY GAME OVER ── */
  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.52);
    z-index: 10;
  }
  #overlay.active { display: flex; }

  #modal {
    background: #fff;
    border-radius: 20px;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 12px 48px rgba(0,0,0,0.45);
    min-width: 260px;
    animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  #modal h2 {
    font-size: 2.2rem;
    font-weight: 900;
    color: #e03c3c;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #7a0000;
    margin-bottom: 22px;
  }

  .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f5f5f5;
    border-radius: 10px;
    padding: 10px 18px;
    margin-bottom: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #333;
  }
  .score-row span:last-child {
    font-size: 1.4rem;
    color: #e08a00;
  }

  #new-record {
    display: none;
    background: linear-gradient(90deg, #f9c802, #f97c00);
    color: #fff;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 1px;
    border-radius: 8px;
    padding: 8px 16px;
    margin: 10px 0 20px;
    animation: pulse 0.7s infinite alternate;
  }
  @keyframes pulse { from{transform:scale(1);} to{transform:scale(1.04);} }

  #btn-restart {
    margin-top: 18px;
    background: #2ecc40;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 38px;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    box-shadow: 0 4px 0 #1a7a25;
  }
  #btn-restart:hover  { background: #27ae36; }
  #btn-restart:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a7a25; }
</style>
</head>
<body>

<div id="canvas-wrapper">
  <canvas id="gameCanvas"></canvas>

  <div id="overlay">
    <div id="modal">
      <h2>GAME OVER</h2>
      <div class="score-row">
        <span>🏅 SCORE</span><span id="modal-score">0</span>
      </div>
      <div class="score-row">
        <span>🏆 BEST</span><span id="modal-best">0</span>
      </div>
      <div id="new-record">🏆 NOVO RECORDE!</div>
      <button id="btn-restart">JOGAR NOVAMENTE</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────
//  CONSTANTES CONFIGURÁVEIS
// ─────────────────────────────────────────────────
const GRAVITY          = 1800;  // px/s²
const FLAP_FORCE       = -520;  // px/s
const TERMINAL_VEL     = 600;   // px/s

const PIPE_GAP         = 160;   // px
const PIPE_WIDTH       = 60;    // px
const PIPE_SPEED_BASE  = 200;   // px/s
const PIPE_SPEED_MAX   = 350;   // px/s
const PIPE_INTERVAL    = 1500;  // ms

const BIRD_RADIUS      = 18;    // px (visual)
const BIRD_HITBOX_R    = 13;    // px (hitbox)
const ANIM_INTERVAL    = 120;   // ms

const BASE_WIDTH       = 360;   // px
const BASE_HEIGHT      = 640;   // px
const GROUND_HEIGHT    = 80;    // px

const DEATH_DELAY      = 0.8;   // segundos antes do modal

// ─────────────────────────────────────────────────
//  UTILITÁRIOS
// ─────────────────────────────────────────────────
const clamp = (v, mn, mx) => Math.min(Math.max(v, mn), mx);
const randomBetween = (a, b) => a + Math.random() * (b - a);

/** Interseção círculo × AABB */
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = clamp(cx, rx, rx + rw);
  const nearY = clamp(cy, ry, ry + rh);
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

// ─────────────────────────────────────────────────
//  WEB AUDIO API — sons procedurais
// ─────────────────────────────────────────────────
class SoundFX {
  constructor() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this.ctx = null; }
  }

  _tone(freq1, freq2, dur, type = 'sine', vol = 0.18) {
    if (!this.ctx) return;
    try {
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      g.connect(this.ctx.destination);
      const osc = this.ctx.createOscillator();
      osc.type = type;
      osc.frequency.setValueAtTime(freq1, this.ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(freq2, this.ctx.currentTime + dur);
      osc.connect(g);
      osc.start();
      osc.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  }

  flap()  { this._tone(600, 900, 0.08, 'sine', 0.15); }
  score() {
    this._tone(700, 700, 0.06, 'square', 0.1);
    setTimeout(() => this._tone(900, 900, 0.06, 'square', 0.1), 80);
  }
  hit()   { this._tone(400, 80, 0.2, 'sawtooth', 0.25); }

  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
}

// ─────────────────────────────────────────────────
//  BACKGROUND — paralaxe em 4 camadas
// ─────────────────────────────────────────────────
class Background {
  constructor(w, h) {
    this.w = w; this.h = h;
    this.groundOffset = 0;
    this.cityOffset   = 0;
    this.cloudOffset  = 0;

    // Nuvens
    this.clouds = Array.from({ length: 5 }, () => ({
      x: randomBetween(0, w),
      y: randomBetween(h * 0.05, h * 0.35),
      r: randomBetween(22, 40),
    }));

    // Prédios
    this.buildings = Array.from({ length: 12 }, (_, i) => ({
      x: i * (w / 11),
      w: randomBetween(28, 55),
      h: randomBetween(40, 110),
    }));
  }

  update(dt, speed, paused) {
    if (paused) return;
    this.cloudOffset  = (this.cloudOffset  + 30  * dt) % this.w;
    this.cityOffset   = (this.cityOffset   + 60  * dt) % this.w;
    this.groundOffset = (this.groundOffset + speed * dt) % 48;
  }

  draw(ctx) {
    const { w, h } = this;

    // 1. Céu
    const sky = ctx.createLinearGradient(0, 0, 0, h - GROUND_HEIGHT);
    sky.addColorStop(0, '#70C5CE');
    sky.addColorStop(1, '#C9E8F0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // 2. Prédios (offset)
    ctx.fillStyle = '#8B9BB4';
    for (const b of this.buildings) {
      const x = ((b.x - this.cityOffset) % w + w) % w;
      const y = h - GROUND_HEIGHT - b.h;
      ctx.fillRect(x - b.w / 2, y, b.w, b.h);
      // Janelas
      ctx.fillStyle = 'rgba(255,255,190,0.3)';
      for (let wy = y + 6; wy < y + b.h - 6; wy += 14)
        for (let wx = x - b.w / 2 + 6; wx < x + b.w / 2 - 6; wx += 10)
          ctx.fillRect(wx, wy, 5, 7);
      ctx.fillStyle = '#8B9BB4';
    }

    // 3. Nuvens
    for (const c of this.clouds) {
      const cx = ((c.x - this.cloudOffset) % (w + c.r * 4) + (w + c.r * 4)) % (w + c.r * 4) - c.r * 2;
      this._drawCloud(ctx, cx, c.y, c.r);
    }

    // 4. Chão
    this._drawGround(ctx, w, h);
  }

  _drawCloud(ctx, x, y, r) {
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#fff';
    const blobs = [
      [x, y, r], [x + r, y - r * 0.3, r * 0.9],
      [x - r, y - r * 0.2, r * 0.8], [x + r * 1.8, y, r * 0.75],
    ];
    for (const [bx, by, br] of blobs) {
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  _drawGround(ctx, w, h) {
    const gy = h - GROUND_HEIGHT;
    // Base
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, gy, w, GROUND_HEIGHT);
    // Faixa escura no topo
    ctx.fillStyle = '#c8a070';
    ctx.fillRect(0, gy, w, 6);
    // Grama animada
    const gw = 48;
    ctx.fillStyle = '#5cb85c';
    for (let i = -1; i < Math.ceil(w / gw) + 2; i++) {
      const gx = (i * gw - this.groundOffset % gw + gw) % (w + gw) - gw;
      ctx.fillRect(gx, gy, gw - 4, 10);
    }
    // Linhas de textura
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    for (let i = -1; i < Math.ceil(w / gw) + 2; i++) {
      const gx = (i * gw - this.groundOffset % gw + gw) % (w + gw) - gw;
      ctx.fillRect(gx + gw - 4, gy + 10, 4, GROUND_HEIGHT - 10);
    }
  }

  resize(w, h) { this.w = w; this.h = h; }
}

// ─────────────────────────────────────────────────
//  BIRD
// ─────────────────────────────────────────────────
class Bird {
  constructor(x, y) {
    this.startX = x; this.startY = y;
    this.x = x; this.y = y;
    this.velocity = 0;
    this.angle    = 0;           // graus
    this.frame    = 0;           // 0=meio, 1=cima, 2=baixo
    this._animTimer = 0;
    this._animFrozen = false;
    this.alive = true;
  }

  reset() {
    this.x = this.startX; this.y = this.startY;
    this.velocity = 0; this.angle = 0; this.frame = 0;
    this._animTimer = 0; this._animFrozen = false; this.alive = true;
  }

  flap() { this.velocity = FLAP_FORCE; }

  freezeAnim() { this._animFrozen = true; }

  update(dt) {
    // Física
    this.velocity = clamp(this.velocity + GRAVITY * dt, -1000, TERMINAL_VEL);
    this.y += this.velocity * dt;

    // Rotação suave
    const target = clamp(this.velocity / 10, -25, 90);
    this.angle += (target - this.angle) * Math.min(dt * 12, 1);

    // Animação de asa
    if (!this._animFrozen) {
      this._animTimer += dt * 1000;
      if (this._animTimer >= ANIM_INTERVAL) {
        this._animTimer = 0;
        this.frame = (this.frame + 1) % 3;
      }
    }
  }

  draw(ctx, scale) {
    const r  = BIRD_RADIUS * scale;
    const cx = this.x, cy = this.y;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.angle * Math.PI / 180);

    // Corpo — gradiente radial
    const bodyGrad = ctx.createRadialGradient(-r * 0.2, -r * 0.2, r * 0.05, 0, 0, r);
    bodyGrad.addColorStop(0, '#FFE040');
    bodyGrad.addColorStop(0.5, '#FFA500');
    bodyGrad.addColorStop(1, '#CC6600');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();

    // Asa animada
    const wingY = this.frame === 0 ? 0 : this.frame === 1 ? -r * 0.5 : r * 0.5;
    ctx.fillStyle = '#FF8C00';
    ctx.beginPath();
    ctx.ellipse(-r * 0.2, wingY, r * 0.55, r * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Olho
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(r * 0.3, -r * 0.2, r * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(r * 0.38, -r * 0.18, r * 0.17, 0, Math.PI * 2);
    ctx.fill();
    // Reflexo
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(r * 0.44, -r * 0.25, r * 0.07, 0, Math.PI * 2);
    ctx.fill();

    // Bico
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.moveTo(r * 0.55, -r * 0.08);
    ctx.lineTo(r * 1.05, -r * 0.14);
    ctx.lineTo(r * 1.05, r * 0.01);
    ctx.lineTo(r * 0.55, r * 0.08);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#CC4400';
    ctx.beginPath();
    ctx.moveTo(r * 0.55, -r * 0.02);
    ctx.lineTo(r * 1.05, -r * 0.02);
    ctx.lineTo(r * 1.05, r * 0.01);
    ctx.lineTo(r * 0.55, r * 0.08);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

// ─────────────────────────────────────────────────
//  PIPE — um par de canos
// ─────────────────────────────────────────────────
class Pipe {
  constructor(x, gapCenterY, canvasH, speed) {
    this.x = x;
    this.gapCenterY = gapCenterY;
    this.speed = speed;
    this.canvasH = canvasH;
    this.scored = false;
    this.width = PIPE_WIDTH;
    this.halfGap = PIPE_GAP / 2;
  }

  update(dt) { this.x -= this.speed * dt; }

  isOffScreen() { return this.x + this.width < 0; }

  draw(ctx, scale) {
    const { x, gapCenterY, halfGap, canvasH } = this;
    const w = PIPE_WIDTH * scale;
    const bw = w + 10 * scale; // bocal mais largo
    const bn = 20 * scale;     // altura do bocal

    const topH  = gapCenterY - halfGap;
    const botY  = gapCenterY + halfGap;
    const botH  = canvasH - GROUND_HEIGHT - botY;

    // === Cano superior ===
    this._drawPipeBody(ctx, x, 0, w, topH, scale, true);
    // Bocal inferior do cano superior
    this._drawNozzle(ctx, x - (bw - w) / 2, topH - bn, bw, bn, scale, true);

    // === Cano inferior ===
    this._drawPipeBody(ctx, x, botY + bn, w, botH - bn, scale, false);
    // Bocal superior do cano inferior
    this._drawNozzle(ctx, x - (bw - w) / 2, botY, bw, bn, scale, false);
  }

  _drawPipeBody(ctx, x, y, w, h, scale, top) {
    if (h <= 0) return;
    // Gradiente lateral para dar volume
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, '#1a7a25');
    grad.addColorStop(0.25, '#2ECC40');
    grad.addColorStop(0.75, '#2ECC40');
    grad.addColorStop(1, '#1a6a1f');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
    // Borda escura
    ctx.strokeStyle = '#14521a';
    ctx.lineWidth = 2 * scale;
    ctx.strokeRect(x, y, w, h);
    // Reflexo
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 4 * scale, y, 6 * scale, h);
  }

  _drawNozzle(ctx, x, y, w, h, scale) {
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, '#166020');
    grad.addColorStop(0.2, '#27ae36');
    grad.addColorStop(0.8, '#27ae36');
    grad.addColorStop(1, '#145018');
    ctx.fillStyle = grad;
    const r = 4 * scale;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#0d3d14';
    ctx.lineWidth = 2 * scale;
    ctx.stroke();
    // Reflexo
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(x + 4 * scale, y + 2 * scale, 8 * scale, h - 4 * scale);
  }

  /** Hitboxes: [{rx, ry, rw, rh}, ...] */
  getRects(scale) {
    const w = PIPE_WIDTH * scale;
    const bw = w + 10 * scale;
    const { x, gapCenterY, halfGap, canvasH } = this;
    const bx = x - (bw - w) / 2;
    return [
      { rx: bx, ry: 0, rw: bw, rh: gapCenterY - halfGap }, // cima
      { rx: bx, ry: gapCenterY + halfGap, rw: bw, rh: canvasH - GROUND_HEIGHT - (gapCenterY + halfGap) }, // baixo
    ];
  }
}

// ─────────────────────────────────────────────────
//  PIPE MANAGER
// ─────────────────────────────────────────────────
class PipeManager {
  constructor(canvasW, canvasH) {
    this.canvasW = canvasW; this.canvasH = canvasH;
    this.pipes = [];
    this._timer = 0;
    this._speed = PIPE_SPEED_BASE;
  }

  get speed() { return this._speed; }

  reset(canvasW, canvasH) {
    this.canvasW = canvasW; this.canvasH = canvasH;
    this.pipes = [];
    this._timer = 0;
    this._speed = PIPE_SPEED_BASE;
  }

  updateSpeed(score) {
    const bonus = Math.floor(score / 5) * 10;
    this._speed = Math.min(PIPE_SPEED_BASE + bonus, PIPE_SPEED_MAX);
  }

  update(dt, paused) {
    if (paused) return;
    this._timer += dt * 1000;
    if (this._timer >= PIPE_INTERVAL) {
      this._timer = 0;
      this._spawn();
    }
    for (const p of this.pipes) p.update(dt);
    // Remover saídos da tela
    while (this.pipes.length && this.pipes[0].isOffScreen()) this.pipes.shift();
  }

  _spawn() {
    const minY = this.canvasH * 0.2 + PIPE_GAP / 2;
    const maxY = this.canvasH * 0.8 - PIPE_GAP / 2 - GROUND_HEIGHT;
    const gapY = randomBetween(minY, maxY);
    this.pipes.push(new Pipe(this.canvasW + 10, gapY, this.canvasH, this._speed));
  }

  /** Verifica colisão e retorna true; também conta score se crossed */
  checkCollisionAndScore(bird, hitR, scale, onScore) {
    for (const p of this.pipes) {
      // Score: pássaro passou pelo eixo do cano
      if (!p.scored && p.x + p.width * scale < bird.x) {
        p.scored = true;
        onScore();
      }
      // Colisão
      for (const { rx, ry, rw, rh } of p.getRects(scale)) {
        if (circleRect(bird.x, bird.y, hitR, rx, ry, rw, rh)) return true;
      }
    }
    return false;
  }

  draw(ctx, scale) {
    for (const p of this.pipes) p.draw(ctx, scale);
  }

  resize(w, h) { this.canvasW = w; this.canvasH = h; }
}

// ─────────────────────────────────────────────────
//  GAME — orquestrador principal
// ─────────────────────────────────────────────────
class Game {
  constructor() {
    this.canvas  = document.getElementById('gameCanvas');
    this.ctx     = this.canvas.getContext('2d');
    this.overlay = document.getElementById('overlay');
    this.sfx     = new SoundFX();

    this.state   = 'MENU'; // 'MENU' | 'PLAYING' | 'DYING' | 'GAME_OVER'
    this.score   = 0;
    this.highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;

    this._raf    = null;
    this._last   = null;

    // Flash branco pós-colisão
    this._flashFrames = 0;
    this._deathTimer  = 0;

    // Piscar texto do menu
    this._blink   = true;
    this._blinkId = null;

    this._resize();
    this._initObjects();
    this._attachInput();
    window.addEventListener('resize', () => this._resize());

    document.getElementById('btn-restart').addEventListener('click', () => this._restart());

    this._loop(performance.now());
  }

  _resize() {
    const wrapper = document.getElementById('canvas-wrapper');
    const vw = window.innerWidth, vh = window.innerHeight;
    let cw, ch;
    if (vw / vh < BASE_WIDTH / BASE_HEIGHT) {
      cw = vw; ch = vw * BASE_HEIGHT / BASE_WIDTH;
    } else {
      ch = vh; cw = vh * BASE_WIDTH / BASE_HEIGHT;
    }
    cw = Math.floor(cw); ch = Math.floor(ch);
    this.canvas.width  = cw; this.canvas.height = ch;
    wrapper.style.width  = cw + 'px';
    wrapper.style.height = ch + 'px';
    this.scale = cw / BASE_WIDTH;

    if (this.bg) this.bg.resize(cw, ch);
    if (this.pipeManager) this.pipeManager.resize(cw, ch);
    if (this.bird) {
      this.bird.startX = cw * 0.3;
      this.bird.startY = ch * 0.45;
    }
  }

  _initObjects() {
    const cw = this.canvas.width, ch = this.canvas.height;
    this.bg   = new Background(cw, ch);
    this.bird = new Bird(cw * 0.3, ch * 0.45);
    this.pipeManager = new PipeManager(cw, ch);
  }

  _attachInput() {
    const handle = (e) => {
      if (e.type === 'touchstart') e.preventDefault();
      this.sfx.resume();
      if (this.state === 'MENU') {
        this._startPlaying();
      } else if (this.state === 'PLAYING') {
        this.bird.flap();
        this.sfx.flap();
      }
    };
    this.canvas.addEventListener('click',      handle);
    this.canvas.addEventListener('touchstart', handle, { passive: false });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handle(e); }
      if (e.code === 'Enter' && this.state === 'GAME_OVER') this._restart();
    });
  }

  _startPlaying() {
    this.state = 'PLAYING';
    this.score = 0;
    this.bird.flap();
    this.sfx.flap();
    this._stopBlink();
  }

  _startBlink() {
    this._blink = true;
    this._blinkId = setInterval(() => { this._blink = !this._blink; }, 600);
  }
  _stopBlink() {
    clearInterval(this._blinkId);
    this._blinkId = null;
  }

  _onScore() {
    this.score++;
    this.sfx.score();
    this.pipeManager.updateSpeed(this.score);
  }

  _triggerDeath() {
    this.state = 'DYING';
    this.sfx.hit();
    this._flashFrames = 3;
    this._deathTimer  = 0;
    this.bird.freezeAnim();
  }

  _showGameOver() {
    this.state = 'GAME_OVER';
    let newRecord = false;
    if (this.score > this.highScore) {
      this.highScore = this.score;
      localStorage.setItem('flappyHighScore', this.highScore);
      newRecord = true;
    }
    document.getElementById('modal-score').textContent = this.score;
    document.getElementById('modal-best').textContent  = this.highScore;
    const rec = document.getElementById('new-record');
    rec.style.display = newRecord ? 'block' : 'none';
    this.overlay.classList.add('active');
  }

  _restart() {
    this.overlay.classList.remove('active');
    this.state = 'MENU';
    this.score = 0;
    this.bird.reset();
    this.pipeManager.reset(this.canvas.width, this.canvas.height);
    this._startBlink();
  }

  // ── GAME LOOP ──────────────────────────────────
  _loop(now) {
    this._raf = requestAnimationFrame(t => this._loop(t));
    const dt = this._last ? Math.min((now - this._last) / 1000, 0.05) : 0;
    this._last = now;
    this._update(dt);
    this._draw();
  }

  _update(dt) {
    const cw = this.canvas.width, ch = this.canvas.height;
    const s  = this.scale;
    const hitR = BIRD_HITBOX_R * s;

    if (this.state === 'MENU') {
      // Bob suave do pássaro no menu
      this.bird.y = this.bird.startY + Math.sin(performance.now() / 400) * 8 * s;
      this.bird.update(0); // apenas animação de asa
      this.bg.update(dt, PIPE_SPEED_BASE * s, false);
      if (this._blinkId === null) this._startBlink();
      return;
    }

    if (this.state === 'PLAYING') {
      this.bird.update(dt);
      this.pipeManager.update(dt, false);
      this.bg.update(dt, this.pipeManager.speed * s, false);

      // Colisão com chão ou topo
      const groundY = ch - GROUND_HEIGHT * s;
      if (this.bird.y + hitR >= groundY || this.bird.y - hitR <= 0) {
        this._triggerDeath();
        return;
      }
      // Colisão com canos
      if (this.pipeManager.checkCollisionAndScore(this.bird, hitR, s, () => this._onScore())) {
        this._triggerDeath();
        return;
      }
    }

    if (this.state === 'DYING') {
      // Pássaro continua caindo, fundo/canos congelados
      this.bird.update(dt);
      this._flashFrames = Math.max(0, this._flashFrames - 1);
      this._deathTimer += dt;
      if (this._deathTimer >= DEATH_DELAY) this._showGameOver();
    }
  }

  _draw() {
    const ctx = this.ctx;
    const cw = this.canvas.width, ch = this.canvas.height;
    const s  = this.scale;

    ctx.clearRect(0, 0, cw, ch);
    this.bg.draw(ctx);
    this.pipeManager.draw(ctx, s);
    this.bird.draw(ctx, s);

    // Flash branco pós-colisão
    if (this._flashFrames > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillRect(0, 0, cw, ch);
    }

    // HUD — pontuação durante jogo
    if (this.state === 'PLAYING' || this.state === 'DYING') {
      this._drawScore(ctx, cw, s);
    }

    // Menu
    if (this.state === 'MENU') {
      this._drawMenu(ctx, cw, ch, s);
    }
  }

  _drawScore(ctx, cw, s) {
    const txt = String(this.score);
    ctx.font = `bold ${Math.round(48 * s)}px 'Segoe UI', sans-serif`;
    ctx.lineWidth = 3 * s;
    ctx.strokeStyle = '#222';
    ctx.strokeText(txt, cw / 2 - ctx.measureText(txt).width / 2, 60 * s);
    ctx.fillStyle = '#fff';
    ctx.fillText(txt, cw / 2 - ctx.measureText(txt).width / 2, 60 * s);
  }

  _drawMenu(ctx, cw, ch, s) {
    // Painel semitransparente
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    const pw = 280 * s, ph = 170 * s;
    const px = (cw - pw) / 2, py = ch * 0.12;
    this._roundRect(ctx, px, py, pw, ph, 16 * s);
    ctx.fill();

    // Título
    ctx.textAlign = 'center';
    ctx.font = `900 ${Math.round(42 * s)}px 'Segoe UI', sans-serif`;
    ctx.lineWidth = 4 * s;
    ctx.strokeStyle = '#333';
    ctx.strokeText('FLAPPY BIRD', cw / 2, py + 60 * s);
    ctx.fillStyle = '#FFE040';
    ctx.fillText('FLAPPY BIRD', cw / 2, py + 60 * s);

    // High score
    if (this.highScore > 0) {
      ctx.font = `700 ${Math.round(18 * s)}px 'Segoe UI', sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText(`🏆 RECORDE: ${this.highScore}`, cw / 2, py + 95 * s);
    }

    // Texto piscante
    if (this._blink) {
      ctx.font = `600 ${Math.round(15 * s)}px 'Segoe UI', sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText('Clique ou ESPAÇO para iniciar', cw / 2, py + 135 * s);
    }

    ctx.textAlign = 'left';
  }

  _roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

// ─────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { new Game(); });
</script>
